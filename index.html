<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In Page</title>

<link rel="stylesheet" href="style.css"/>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>


<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

<section class="w-full max-w-md">

<fieldset
class="fieldset bg-base-200 border-base-300 rounded-box border p-6 shadow-lg">

<div class="flex flex-col justify-center items-center text-center">

<img class="w-12 mb-2" src="./assets/github-logo.png">

<h2 class="text-xl md:text-2xl font-bold">
GitHub Issues Tracker
</h2>

<p class="text-sm md:text-base text-gray-600">
Sign in to manage your issues
</p>

</div>


<label class="label mt-4">Username</label>

<input
id="Inbut-name"
type="text"
class="input w-full"
placeholder="Enter Username"
/>

<p class="text-blue-700 text-xs md:text-sm font-semibold my-1">
Default: admin
</p>


<label class="label">Password</label>

<input
id="Inbut-Password"
type="password"
class="input w-full"
placeholder="Enter Password"
/>

<p class="text-blue-700 text-xs md:text-sm font-semibold my-1">
Default: admin123
</p>


<button id="click-Btn" class="btn btn-neutral w-full mt-4">
Sign In
</button>


<div class="text-center mt-5 text-sm md:text-base space-y-2">

<h2 class="font-bold">OR</h2>

<h2 class="font-semibold">Demo Credentials:</h2>

<p><span class="font-bold">Username:</span> admin</p>

<p><span class="font-bold">Password:</span> admin123</p>

</div>

</fieldset>


<p id="massage" class="text-center text-red-500 mt-3"></p>

</section>


<script src="./script.js"></script>

</body>
</html>
