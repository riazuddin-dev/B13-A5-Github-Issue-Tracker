<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sing In Page</title>

    <!-- stylet.css link  -->

    <link rel="stylesheet" href="style.css" />

    <!-- Daisy Ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font style  -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font Family -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="w-1/3 mx-auto my-10">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-xl border p-6"
      >
        <div class="flex flex-col justify-center items-center">
          <img src="./assets/github-logo.png" alt="" />
          <h2 class="text-2xl font-bold mt-4">GitHub Issues Tracker</h2>
          <p class="text-xl font-semi">Sign in to manage your issues</p>
        </div>

        <label class="label">Username</label>
        <input
          id="Inbut-name"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        />

        <p class="text-blue-700 text-sm font-semibold my-1">Default: admin</p>

        <label class="label">Password</label>
        <input
          id="Inbut-Password"
          type="password"
          class="input w-full"
          placeholder="Enter Password"
        />

        <p class="text-blue-700 text-sm font-semibold my-1">
          Default: admin123
        </p>

        <button id="click-Btn" class="btn btn-neutral mt-4">Sign In</button>

        <div class="text-center mt-5 text-xl space-y-2">
          <h2 class="font-bold">OR</h2>

          <h2 class="font-semi">Demo Credentials:</h2>

          <p><span class="text-xl font-bold">Username:</span> admin</p>
          <p><span class="text-xl font-bold"> Password:</span> admin123</p>
        </div>
      </fieldset>

      <!-- massage show  -->

      <p id="massage"></p>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
