<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

</head>


<body class="bg-gray-50">


<!-- Loader -->

<div id="loader"
class="hidden fixed inset-0 flex justify-center items-center bg-white/70 z-50">

<span class="loading loading-spinner loading-lg"></span>

</div>



<!-- Navbar -->

<section>

<div class="navbar bg-base-100 shadow-sm px-4 md:px-16 flex-wrap gap-4">

<div class="flex-1">

<div class="flex items-center gap-2">

<img class="w-8 md:w-10" src="./assets/github-logo.png">

<p class="text-lg md:text-xl font-bold">
GitHub Issues Tracker
</p>

</div>

</div>


<div class="flex gap-2 w-full md:w-auto">

<label class="input input-bordered flex items-center gap-2 w-full">

<input
id="search-input"
type="search"
placeholder="Search issues"
class="grow"
/>

</label>

<button onclick="handleSearch()" class="btn btn-primary">
Search
</button>

</div>

</div>

</section>



<!-- Tabs -->

<section>

<div
id="button-con"
class="w-11/12 mx-auto p-4 md:p-5 mt-8 flex flex-wrap gap-3 shadow border rounded">

<button id="all" class="btn btn-primary">All</button>

<button id="open" class="btn">Open</button>

<button id="closed" class="btn">Closed</button>

</div>

</section>



<!-- Header -->

<section>

<div
class="w-11/12 mx-auto p-4 md:p-5 mt-5 shadow border rounded flex flex-col md:flex-row justify-between md:items-center gap-4">

<div class="flex items-center gap-3">

<img class="w-8" src="./assets/Group 1.png">

<div>

<p class="text-lg font-semibold">

<span id="all-count" class="text-xl font-bold"></span>
Issues

</p>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>


<div class="flex gap-4 text-sm font-semibold">

<p id="status-open" class="text-green-600"></p>

<p id="status-closed" class="text-purple-600"></p>

</div>

</div>



<!-- Issues Grid -->

<div
id="All-Issues-Contenar"
class="w-11/12 mx-auto mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

</div>

</section>



<!-- Modal -->

<div
id="issue-modal"
class="hidden fixed inset-0 bg-black/40 flex justify-center items-center z-50 px-4">

<div class="bg-white p-6 md:p-8 rounded-xl w-full max-w-[650px]">

<h2
id="modal-title"
class="text-xl md:text-3xl font-bold mb-3">
</h2>


<div class="flex flex-wrap items-center gap-3 text-sm mb-4">

<span
id="modal-status"
class="bg-green-600 text-white px-3 py-1 rounded-full text-xs">
</span>

<span id="modal-author"></span>

<span id="modal-date"></span>

</div>


<div id="modal-labels" class="flex flex-wrap gap-2 mb-5"></div>

<p id="modal-description" class="text-gray-600 mb-6"></p>


<div class="bg-gray-100 p-4 rounded flex flex-col md:flex-row justify-between gap-4">

<div>

<p class="text-sm text-gray-500">Assignee:</p>

<p id="modal-assignee" class="font-semibold"></p>

</div>


<div>

<p class="text-sm text-gray-500">Priority:</p>

<p
id="modal-priority"
class="bg-red-500 text-white px-3 py-1 rounded-full text-xs inline-block">
</p>

</div>

</div>


<div class="flex justify-end mt-6">

<button onclick="closeModal()" class="btn btn-primary">
Close
</button>

</div>

</div>

</div>



<script src="homepage.js"></script>

</body>
</html>
